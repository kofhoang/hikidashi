name: tests

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore Hikidashi.slnx

      - name: Build
        run: dotnet build Hikidashi.slnx -c Release --no-restore

      # ubuntu-latest has Docker, so the Testcontainers-based Data integration
      # tests run for real here (they skip locally when Docker is absent).
      - name: Test
        run: dotnet test Hikidashi.slnx -c Release --no-build --verbosity normal
